quarkus.http.host=0.0.0.0
quarkus.http.port=${PORT:8080}
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.static-resources.index-page=index.html
quarkus.jackson.fail-on-unknown-properties=false
quarkus.http.auth.permission.oidc.paths=/api/login,/api/logout
quarkus.http.auth.permission.oidc.policy=authenticated

app.auth.enabled=${AUTH_ENABLED:false}
app.words.path=${WORDS_PATH:words/it-words.json}
app.game.timezone=${GAME_TIMEZONE:Europe/Rome}
app.word.seed=${HUFF_WORD_SEED:huff-it-hexaquott}
app.cookie.secure=${COOKIE_SECURE:false}

quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=false
quarkus.datasource.jdbc.min-size=1
quarkus.datasource.jdbc.max-size=5
quarkus.hibernate-orm.database.generation=update
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:huff_hexaquot}
%dev.quarkus.datasource.username=${POSTGRES_USER:huff}
%dev.quarkus.datasource.password=${POSTGRES_PASSWORD:huff}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:huff_hexaquot}
%prod.quarkus.datasource.username=${POSTGRES_USER:huff}
%prod.quarkus.datasource.password=${POSTGRES_PASSWORD:huff}

quarkus.oidc.enabled=true
quarkus.oidc.tenant-enabled=${AUTH_ENABLED:false}
quarkus.oidc.application-type=web-app
quarkus.oidc.provider=google
quarkus.oidc.client-id=${GOOGLE_CLIENT_ID:}
quarkus.oidc.credentials.secret=${GOOGLE_CLIENT_SECRET:}
quarkus.oidc.authentication.redirect-path=/auth/callback
quarkus.oidc.authentication.restore-path-after-redirect=true
quarkus.oidc.authentication.cookie-force-secure=${COOKIE_SECURE:false}
quarkus.oidc.authentication.cookie-path=/

%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.db-name=huff_hexaquot_test
%test.quarkus.datasource.devservices.username=huff
%test.quarkus.datasource.devservices.password=huff
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.app.auth.enabled=false
%test.quarkus.oidc.enabled=false
